{% extends 'base.html' %}
{% block title %}Change Password — PestSightLog{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h2>Change Password</h2>
    <p>Update the password for your account ({{ current_user.username }})</p>
  </div>
</div>

<div class="form-card" style="max-width:480px">
  <form method="POST" action="{{ url_for('change_password') }}">
    <div class="form-group">
      <label for="current_password">Current Password *</label>
      <input type="password" id="current_password" name="current_password" required>
    </div>
    <div class="form-group">
      <label for="new_password">New Password *</label>
      <input type="password" id="new_password" name="new_password" placeholder="Minimum 6 characters" required>
    </div>
    <div class="form-group">
      <label for="confirm_password">Confirm New Password *</label>
      <input type="password" id="confirm_password" name="confirm_password" required>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Update Password</button>
      <a href="{{ url_for('sightings') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
